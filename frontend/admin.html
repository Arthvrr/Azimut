<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azimut - Espace Chef</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scout: { green: '#2E7D32', light: '#E8F5E9', dark: '#1B5E20' }
                    }
                }
            }
        }
    </script>
    <style>
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #111827; text-transform: capitalize; }
        .fc .fc-button-primary { background-color: #2E7D32 !important; border-color: #2E7D32 !important; }
        .fc .fc-button-primary:hover { background-color: #1B5E20 !important; }
        .fc-event { cursor: pointer; transition: opacity 0.2s; }
        .fc-event:hover { opacity: 0.9; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-scout-green rounded-lg flex items-center justify-center text-white font-bold text-xl">A</div>
            <h1 class="text-2xl font-bold text-gray-900">Azimut <span class="text-sm font-normal text-gray-500 ml-2">Espace Chef</span></h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-6 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Rédiger une Newsletter</h2>
                <form id="massMailForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sujet</label>
                        <input type="text" id="subject" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                        <textarea id="message" rows="5" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none resize-y"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-scout-green hover:bg-scout-dark text-white px-6 py-3 rounded-lg font-medium transition-colors">
                        Envoyer à la section
                    </button>
                    <p id="statusMessage" class="mt-2 text-sm font-medium text-center"></p>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 flex flex-col">
                <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Absences signalées</h2>
                <div id="absencesList" class="space-y-4 overflow-y-auto flex-1 max-h-[350px] pr-2">
                    <p class="text-gray-500 text-sm text-center italic mt-10">Chargement des absences...</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                <h2 class="text-xl font-bold text-gray-900">Calendrier de la section</h2>
                <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Cliquez pour ajouter/modifier</span>
            </div>
            <div id="calendar" class="min-h-[600px]"></div>
        </div>
    </main>

    <div id="eventModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 mb-4">Ajouter un événement</h3>
            <form id="eventForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
                    <input type="text" id="eventTitle" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lieu / Adresse</label>
                    <input type="text" id="eventLocation" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none" placeholder="Ex: Au local">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description (Matériel...)</label>
                    <textarea id="eventDesc" rows="2" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Début</label>
                        <input type="datetime-local" id="eventStart" required class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fin</label>
                        <input type="datetime-local" id="eventEnd" required class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none">
                    </div>
                </div>
                
                <div class="flex gap-2 pt-4">
                    <button type="button" id="deleteEventBtn" class="hidden flex-1 bg-white border-2 border-red-500 text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg font-medium transition-colors">Supprimer</button>
                    <button type="button" id="closeModalBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 px-3 py-2 rounded-lg font-medium transition-colors">Annuler</button>
                    <button type="submit" id="saveEventBtn" class="flex-1 bg-scout-green hover:bg-scout-dark text-white px-3 py-2 rounded-lg font-medium transition-colors">Enregistrer</button>
                </div>
                <p id="eventError" class="text-sm text-red-600 hidden text-center mt-2"></p>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://nbhpninmmpayivjqhouj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iaHBuaW5tbXBheWl2anFob3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTgyNzMsImV4cCI6MjA5ODEzNDI3M30.A6BdwmCVq6uWK6hlNekvetek3Er3LfO67vfwlRPpcpU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- CHARGEMENT DES ABSENCES ---
        async function fetchAbsences() {
            const list = document.getElementById('absencesList');
            // On joint les tables pour avoir les noms des enfants et les titres des événements !
            const { data, error } = await supabaseClient
                .from('absences')
                .select(`
                    reason,
                    created_at,
                    events (title, start_time),
                    children (first_name, last_name)
                `)
                .order('created_at', { ascending: false });

            if (error) {
                list.innerHTML = `<p class="text-red-500 text-sm">Erreur: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                list.innerHTML = `<p class="text-gray-500 text-sm text-center mt-10">Aucune absence signalée.</p>`;
                return;
            }

            list.innerHTML = data.map(abs => {
                const eventDate = new Date(abs.events.start_time).toLocaleDateString('fr-FR', {day: '2-digit', month: 'long'});
                return `
                <div class="p-4 border border-gray-100 rounded-lg bg-red-50 border-l-4 border-l-red-500">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-gray-900">${abs.children.first_name} ${abs.children.last_name}</h4>
                        <span class="text-xs font-semibold text-red-600 bg-red-100 px-2 py-1 rounded-full">Absent(e)</span>
                    </div>
                    <p class="text-sm font-medium text-gray-800 mb-1">🏕️ ${abs.events.title} (${eventDate})</p>
                    <p class="text-sm text-gray-600 italic">Motif : ${abs.reason || 'Non précisé'}</p>
                </div>
                `;
            }).join('');
        }

        // --- GESTION NEWSLETTER ---
        document.getElementById('massMailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusText = document.getElementById('statusMessage');
            btn.disabled = true; btn.textContent = 'Envoi...'; statusText.textContent = '';
            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/send-mass-newsletter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: document.getElementById('subject').value,
                        message: document.getElementById('message').value,
                        section_id: 1
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    statusText.textContent = data.message;
                    statusText.className = "mt-2 text-sm font-medium text-center text-scout-green";
                    document.getElementById('massMailForm').reset();
                } else throw new Error(data.detail);
            } catch (error) {
                statusText.textContent = "Erreur : " + error.message;
                statusText.className = "mt-2 text-sm font-medium text-center text-red-600";
            } finally {
                btn.disabled = false; btn.textContent = 'Envoyer à la section';
            }
        });

        // --- CALENDRIER ---
        function toDatetimeLocal(date) {
            if (!date) return "";
            const d = new Date(date);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().slice(0, 16);
        }

        let calendar;
        const eventModal = document.getElementById('eventModal');
        let currentEventId = null; 

        document.addEventListener('DOMContentLoaded', function() {
            fetchAbsences(); // Charger les absences au démarrage
            
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'fr',
                firstDay: 1, 
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listMonth'
                },
                buttonText: { today: "Aujourd'hui", month: 'Mois', week: 'Semaine', list: 'Planning' },
                events: async function(info, successCallback, failureCallback) {
                    const { data, error } = await supabaseClient.from('events').select('*').eq('section_id', 1);
                    if (error) failureCallback(error);
                    else {
                        const mappedEvents = data.map(e => ({
                            id: e.id, title: e.title,
                            start: new Date(e.start_time), end: new Date(e.end_time),
                            extendedProps: { description: e.description, location: e.location },
                            backgroundColor: '#2E7D32', borderColor: '#1B5E20'
                        }));
                        successCallback(mappedEvents);
                    }
                },
                dateClick: function(info) {
                    currentEventId = null;
                    document.getElementById('eventForm').reset();
                    document.getElementById('modalTitle').textContent = "Ajouter un événement";
                    document.getElementById('deleteEventBtn').classList.add('hidden');
                    const dateStr = info.dateStr;
                    document.getElementById('eventStart').value = `${dateStr}T14:00`;
                    document.getElementById('eventEnd').value = `${dateStr}T17:00`;
                    document.getElementById('eventError').classList.add('hidden');
                    eventModal.classList.remove('hidden');
                },
                eventClick: function(info) {
                    currentEventId = info.event.id;
                    document.getElementById('modalTitle').textContent = "Modifier l'événement";
                    document.getElementById('eventTitle').value = info.event.title;
                    document.getElementById('eventDesc').value = info.event.extendedProps.description || "";
                    document.getElementById('eventLocation').value = info.event.extendedProps.location || "";
                    document.getElementById('eventStart').value = toDatetimeLocal(info.event.start);
                    document.getElementById('eventEnd').value = toDatetimeLocal(info.event.end || info.event.start);
                    document.getElementById('deleteEventBtn').classList.remove('hidden');
                    document.getElementById('eventError').classList.add('hidden');
                    eventModal.classList.remove('hidden');
                }
            });
            calendar.render();
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => { eventModal.classList.add('hidden'); });

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveEventBtn');
            const errorMsg = document.getElementById('eventError');
            btn.disabled = true; btn.textContent = "Sauvegarde..."; errorMsg.classList.add('hidden');

            const eventData = {
                section_id: 1,
                title: document.getElementById('eventTitle').value,
                description: document.getElementById('eventDesc').value,
                location: document.getElementById('eventLocation').value,
                start_time: new Date(document.getElementById('eventStart').value).toISOString(),
                end_time: new Date(document.getElementById('eventEnd').value).toISOString()
            };

            let res = currentEventId ? await supabaseClient.from('events').update(eventData).eq('id', currentEventId) : await supabaseClient.from('events').insert([eventData]);
            
            if (res.error) {
                errorMsg.textContent = res.error.message; errorMsg.classList.remove('hidden');
            } else {
                eventModal.classList.add('hidden'); calendar.refetchEvents();
            }
            btn.disabled = false; btn.textContent = "Enregistrer";
        });

        document.getElementById('deleteEventBtn').addEventListener('click', async () => {
            if (!currentEventId || !confirm("Supprimer définitivement cet événement ?")) return;
            const btn = document.getElementById('deleteEventBtn');
            btn.disabled = true; btn.textContent = "...";
            const { error } = await supabaseClient.from('events').delete().eq('id', currentEventId);
            if (error) { alert("Erreur: " + error.message); } 
            else { eventModal.classList.add('hidden'); calendar.refetchEvents(); }
            btn.disabled = false; btn.textContent = "Supprimer";
        });
    </script>
</body>
</html>
