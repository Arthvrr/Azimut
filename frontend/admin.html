<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azimut - Espace Chef</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { scout: { green: '#2E7D32', light: '#E8F5E9', dark: '#1B5E20' } } } } }
    </script>
    <style>
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #111827; text-transform: capitalize; }
        .fc .fc-button-primary { background-color: #2E7D32 !important; border-color: #2E7D32 !important; }
        .fc .fc-button-primary:hover { background-color: #1B5E20 !important; }
        .fc-event { cursor: pointer; transition: opacity 0.2s; } .fc-event:hover { opacity: 0.9; }
    </style>

    <link rel="icon" type="image/x-icon" href="../logo/logo.ico">

</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-scout-green rounded-lg flex items-center justify-center text-white font-bold text-xl"><img src="../logo/logo.png" alt="Azimut" class="w-full h-full object-contain rounded-lg"></div>
            <h1 class="text-2xl font-bold text-gray-900">Azimut <span class="text-sm font-normal text-gray-500 ml-2">Espace Chef</span></h1>
        </div>
        <div id="userMenu" class="hidden flex items-center gap-4">
            <span class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-medium border border-gray-200">
                Connecté : <span id="userEmailDisplay" class="font-bold text-scout-green"></span>
            </span>
            <button id="logoutBtnNav" class="text-sm text-gray-600 hover:text-red-600 font-medium transition-colors">Se déconnecter</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-6 space-y-8">
        
        <div id="authSection" class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex mb-6 border-b border-gray-200">
                <button id="tabLogin" class="flex-1 pb-3 text-center font-bold text-scout-green border-b-2 border-scout-green transition-colors">Connexion</button>
                <button id="tabRegister" class="flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent transition-colors hover:text-gray-700">Nouveau Chef</button>
            </div>
            <div id="authMessage" class="mb-4 text-sm text-center font-medium"></div>
            
            <form id="loginForm" class="space-y-4">
                <div><label class="block text-sm font-medium">E-mail</label><input type="email" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-scout-green"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mot de passe</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-scout-green pr-10">
                        <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-scout-green text-white px-4 py-3 rounded-lg font-bold hover:bg-scout-dark">Se connecter</button>
                <div class="text-center mt-2"><button type="button" id="forgotPasswordBtn" class="text-xs text-gray-500 hover:text-scout-green hover:underline">Mot de passe oublié ?</button></div>
            </form>

            <form id="registerForm" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Unité</label><select id="regUnite" required class="w-full px-3 py-2 border rounded outline-none"><option value="">Chargement...</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Section</label><select id="regSection" required class="w-full px-3 py-2 border rounded outline-none"><option value="">-- Unité ? --</option></select></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-red-600 mb-1">Code secret staff</label>
                    <div class="relative">
                        <input type="password" id="regCode" required placeholder="Ex: STAFF-SECURE" class="w-full px-4 py-2 border rounded-lg outline-none border-red-200 focus:ring-2 focus:ring-red-400 pr-10">
                        <button type="button" onclick="togglePassword('regCode', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <hr>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm font-medium">Prénom</label><input type="text" id="regFName" required class="w-full px-3 py-2 border rounded outline-none"></div>
                    <div><label class="block text-sm font-medium">Nom</label><input type="text" id="regLName" required class="w-full px-3 py-2 border rounded outline-none"></div>
                </div>
                <div><label class="block text-sm font-medium">Totem</label><input type="text" id="regTotem" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                <div><label class="block text-sm font-medium">E-mail</label><input type="email" id="regEmail" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mot de passe</label>
                    <div class="relative">
                        <input type="password" id="regPassword" required class="w-full px-4 py-2 border rounded-lg outline-none pr-10">
                        <button type="button" onclick="togglePassword('regPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-scout-green text-white px-4 py-3 rounded-lg font-bold hover:bg-scout-dark">Valider mon profil Chef</button>
            </form>
        </div>

        <div id="dashboardSection" class="hidden space-y-6">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full border-t-4 border-t-scout-green">
                <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Newsletter Générale</h2>
                <form id="massMailForm" class="space-y-4">
                    <div><label class="block text-sm font-medium">Sujet</label><input type="text" id="subject" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-scout-green"></div>
                    <div><label class="block text-sm font-medium">Message</label><textarea id="message" rows="8" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-scout-green"></textarea></div>
                    <div>
                        <label class="block text-sm font-medium">Pièce jointe (Optionnel)</label>
                        <input type="file" id="massAttachment" class="w-full px-4 py-2 border rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-scout-green outline-none">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full md:w-auto md:px-12 bg-scout-green hover:bg-scout-dark text-white py-3 rounded-lg font-medium transition-colors">Envoyer à toute la section</button>
                    <p id="statusMessage" class="mt-2 text-sm font-medium"></p>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                    <h2 class="text-xl font-bold text-gray-900">Contacter un parent</h2>
                    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">La réponse vous sera adressée</span>
                </div>
                <form id="directMailForm" class="space-y-4">
                    <div><label class="block text-sm font-medium">Enfant concerné</label><select id="dmChild" required class="w-full px-4 py-3 border rounded-lg outline-none bg-white focus:ring-2 focus:ring-scout-green"><option value="">Chargement...</option></select></div>
                    <div><label class="block text-sm font-medium">Sujet</label><input type="text" id="dmSubject" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-scout-green"></div>
                    <div><label class="block text-sm font-medium">Message</label><textarea id="dmMessage" rows="6" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-scout-green"></textarea></div>
                    <div>
                        <label class="block text-sm font-medium">Pièce jointe (Optionnel)</label>
                        <input type="file" id="dmAttachment" class="w-full px-4 py-2 border rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-scout-green outline-none">
                    </div>
                    <button type="submit" id="submitDmBtn" class="w-full md:w-auto md:px-12 bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-lg font-medium transition-colors">Envoyer l'e-mail</button>
                    <p id="dmStatusMessage" class="mt-2 text-sm font-medium"></p>
                </form>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 flex flex-col">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Absences signalées</h2>
                    <div id="absencesList" class="space-y-4 overflow-y-auto flex-1 max-h-[350px] pr-2"><p class="text-gray-500 text-sm text-center mt-10">Chargement...</p></div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Sécurité du Chef</h2>
                    <p class="text-sm text-gray-500 mb-4">Modifier votre mot de passe d'accès.</p>
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="password" id="newPassword" placeholder="Nouveau mot de passe" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-scout-green outline-none pr-10">
                            <button type="button" onclick="togglePassword('newPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                            </button>
                        </div>
                        <button type="button" id="updatePasswordBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white px-6 py-3 rounded-lg font-medium transition-colors">Mettre à jour</button>
                        <p id="updatePasswordMsg" class="mt-2 text-sm font-medium text-center"></p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                    <h2 class="text-xl font-bold text-gray-900">Calendrier de la section</h2>
                    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Cliquez pour ajouter/modifier</span>
                </div>
                <div id="calendar" class="min-h-[600px]"></div>
            </div>

            <div class="text-center pt-4 pb-10">
                <button id="logoutBtnMain" class="text-red-500 hover:text-red-700 font-medium flex items-center gap-2 justify-center w-full transition-colors">
                    Se déconnecter de l'Espace Chef
                </button>
            </div>
        </div>
    </main>

    <div id="eventModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 mb-4">Ajouter un événement</h3>
            <form id="eventForm" class="space-y-4">
                <div><label class="block text-sm font-medium">Titre</label><input type="text" id="eventTitle" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">Lieu / Adresse</label><input type="text" id="eventLocation" class="w-full px-4 py-2 border rounded-lg" placeholder="Ex: Au local"></div>
                <div><label class="block text-sm font-medium">Description</label><textarea id="eventDesc" rows="2" class="w-full px-4 py-2 border rounded-lg"></textarea></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Début</label><input type="datetime-local" id="eventStart" required class="w-full px-4 py-2 border rounded-lg"></div>
                    <div><label class="block text-sm font-medium">Fin</label><input type="datetime-local" id="eventEnd" required class="w-full px-4 py-2 border rounded-lg"></div>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" id="deleteEventBtn" class="hidden flex-1 bg-white border-2 border-red-500 text-red-500 px-3 py-2 rounded-lg font-medium">Supprimer</button>
                    <button type="button" id="closeModalBtn" class="flex-1 bg-gray-100 text-gray-800 px-3 py-2 rounded-lg font-medium">Annuler</button>
                    <button type="submit" id="saveEventBtn" class="flex-1 bg-scout-green text-white px-3 py-2 rounded-lg font-medium">Enregistrer</button>
                </div>
                <p id="eventError" class="text-sm text-red-600 hidden mt-2"></p>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://nbhpninmmpayivjqhouj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iaHBuaW5tbXBheWl2anFob3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTgyNzMsImV4cCI6MjA5ODEzNDI3M30.A6BdwmCVq6uWK6hlNekvetek3Er3LfO67vfwlRPpcpU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentSectionId = null;

        const ui = {
            auth: document.getElementById('authSection'), dash: document.getElementById('dashboardSection'), msg: document.getElementById('authMessage'),
            loginForm: document.getElementById('loginForm'), registerForm: document.getElementById('registerForm'),
            tabLogin: document.getElementById('tabLogin'), tabRegister: document.getElementById('tabRegister'),
            userMenu: document.getElementById('userMenu'), userEmailDisplay: document.getElementById('userEmailDisplay')
        };

        // --- OUTIL DE CONVERSION POUR LES PIÈCES JOINTES ---
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg class="w-5 h-5 text-scout-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>`;
            }
        }

        async function getActiveEmail() { const { data: { session } } = await supabaseClient.auth.getSession(); return session?.user?.email; }

        ui.tabLogin.addEventListener('click', () => { ui.loginForm.classList.remove('hidden'); ui.registerForm.classList.add('hidden'); ui.tabLogin.className = "flex-1 pb-3 text-center font-bold text-scout-green border-b-2 border-scout-green"; ui.tabRegister.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700"; ui.msg.textContent = ""; });
        ui.tabRegister.addEventListener('click', () => { ui.registerForm.classList.remove('hidden'); ui.loginForm.classList.add('hidden'); ui.tabRegister.className = "flex-1 pb-3 text-center font-bold text-scout-green border-b-2 border-scout-green"; ui.tabLogin.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700"; ui.msg.textContent = ""; loadUnites(); });

        async function loadUnites() {
            const { data } = await supabaseClient.from('unites').select('id, nom_complet');
            if(data) document.getElementById('regUnite').innerHTML = '<option value="">-- Choisir une unité --</option>' + data.map(u => `<option value="${u.id}">${u.nom_complet}</option>`).join('');
        }
        document.getElementById('regUnite').addEventListener('change', async (e) => {
            if(!e.target.value) { document.getElementById('regSection').innerHTML = '<option value="">-- Unité ? --</option>'; return; }
            const { data } = await supabaseClient.from('sections').select('id, nom').eq('unite_id', e.target.value);
            if(data) document.getElementById('regSection').innerHTML = '<option value="">-- Choisir une section --</option>' + data.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
            ui.msg.textContent = "Vérification..."; ui.msg.className = "mb-4 text-sm text-center text-gray-600";
            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                const { data: admin } = await supabaseClient.from('admins').select('section_id').eq('email', email).maybeSingle();
                if(admin) { currentSectionId = admin.section_id; showDashboard(); }
                else { await supabaseClient.auth.signOut(); throw new Error("Accès refusé. Vous n'êtes pas Staff."); }
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sectionId = document.getElementById('regSection').value, codeInput = document.getElementById('regCode').value;
            const email = document.getElementById('regEmail').value, password = document.getElementById('regPassword').value;
            const fname = document.getElementById('regFName').value, lname = document.getElementById('regLName').value, totem = document.getElementById('regTotem').value;
            try {
                const { data: sec } = await supabaseClient.from('sections').select('code_chef').eq('id', sectionId).single();
                if(!sec || sec.code_chef !== codeInput) throw new Error("Code staff invalide !");
                const { error: authErr } = await supabaseClient.auth.signUp({ email, password });
                if (authErr) throw authErr;
                await supabaseClient.from('admins').insert([{ email, first_name: fname, last_name: lname, totem, section_id: sectionId }]);
                currentSectionId = sectionId; showDashboard();
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        const logoutAction = async () => { await supabaseClient.auth.signOut(); window.location.reload(); };
        document.getElementById('logoutBtnNav').addEventListener('click', logoutAction);
        document.getElementById('logoutBtnMain').addEventListener('click', logoutAction);

        document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) { ui.msg.textContent = "Entrez votre e-mail au-dessus."; ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600"; return; }
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) { ui.msg.textContent = error.message; ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600"; }
            else { ui.msg.textContent = "E-mail envoyé."; ui.msg.className = "mb-4 text-sm text-center font-medium text-scout-green"; }
        });

        document.getElementById('updatePasswordBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value; const msg = document.getElementById('updatePasswordMsg');
            if (!newPassword || newPassword.length < 6) { msg.textContent = "Min 6 car."; msg.className = "mt-2 text-sm text-red-600"; return; }
            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
            if (error) { msg.textContent = error.message; msg.className = "mt-2 text-sm text-red-600"; } 
            else { msg.textContent = "Mot de passe mis à jour !"; msg.className = "mt-2 text-sm text-scout-green"; document.getElementById('newPassword').value = ""; }
        });

        async function fetchAbsences() {
            const list = document.getElementById('absencesList');
            const { data, error } = await supabaseClient.from('absences').select(`reason, created_at, events!inner(title, start_time, section_id), children(first_name, last_name)`).eq('events.section_id', currentSectionId).order('created_at', { ascending: false });
            if (!data || data.length === 0) { list.innerHTML = `<p class="text-gray-500 text-sm text-center mt-10">Aucune absence.</p>`; return; }
            list.innerHTML = data.map(abs => `<div class="p-4 border border-gray-100 rounded-lg bg-red-50 border-l-4 border-l-red-500"><div class="flex justify-between items-start mb-1"><h4 class="font-bold text-gray-900">${abs.children.first_name} ${abs.children.last_name}</h4><span class="text-xs font-semibold text-red-600 bg-red-100 px-2 py-1 rounded-full">Absent(e)</span></div><p class="text-sm font-medium text-gray-800 mb-1">🏕️ ${abs.events.title} (${new Date(abs.events.start_time).toLocaleDateString('fr-FR', {day: '2-digit', month: 'long'})})</p><p class="text-sm text-gray-600 italic">Motif : ${abs.reason || 'Non précisé'}</p></div>`).join('');
        }

        async function loadDmChildren() {
            const { data } = await supabaseClient.from('children').select('parent_email, first_name, last_name').eq('section_id', currentSectionId);
            const select = document.getElementById('dmChild');
            if(data) select.innerHTML = '<option value="">-- Choisir un enfant --</option>' + data.map(c => `<option value="${c.parent_email}">${c.first_name} ${c.last_name} (Parent: ${c.parent_email})</option>`).join('');
        }
        
        document.getElementById('directMailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitDmBtn'), statusText = document.getElementById('dmStatusMessage');
            btn.disabled = true; btn.textContent = 'Envoi...'; statusText.textContent = '';
            try {
                const chefEmail = await getActiveEmail();
                
                // Préparation du payload (avec ou sans fichier)
                const payload = {
                    parent_email: document.getElementById('dmChild').value,
                    subject: document.getElementById('dmSubject').value,
                    message: document.getElementById('dmMessage').value,
                    chef_email: chefEmail
                };

                const fileInput = document.getElementById('dmAttachment');
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64 = await toBase64(file);
                    payload.attachment = { name: file.name, content: base64 };
                }

                const response = await fetch('http://127.0.0.1:8000/api/v1/send-direct-email', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) { statusText.textContent = data.message; statusText.className = "mt-2 text-sm text-scout-green font-bold text-center"; document.getElementById('directMailForm').reset(); }
                else throw new Error(data.detail);
            } catch (err) { statusText.textContent = err.message; statusText.className = "mt-2 text-sm text-red-600 font-bold text-center"; } 
            finally { btn.disabled = false; btn.textContent = "Envoyer l'e-mail"; }
        });

        document.getElementById('massMailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'), statusText = document.getElementById('statusMessage');
            btn.disabled = true; btn.textContent = 'Envoi...'; statusText.textContent = '';
            try {
                const payload = {
                    subject: document.getElementById('subject').value, 
                    message: document.getElementById('message').value, 
                    section_id: currentSectionId
                };

                const fileInput = document.getElementById('massAttachment');
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64 = await toBase64(file);
                    payload.attachment = { name: file.name, content: base64 };
                }

                const response = await fetch('http://127.0.0.1:8000/api/v1/send-mass-newsletter', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) { statusText.textContent = data.message; statusText.className = "mt-2 text-sm text-scout-green font-bold"; document.getElementById('massMailForm').reset(); }
                else throw new Error(data.detail);
            } catch (err) { statusText.textContent = err.message; statusText.className = "mt-2 text-sm text-red-600 font-bold"; }
            finally { btn.disabled = false; btn.textContent = 'Envoyer à toute la section'; }
        });

        // --- INITIALISATION CALENDRIER ---
        let calendar; const eventModal = document.getElementById('eventModal'); let currentEventId = null; 
        function toDatetimeLocal(date) { if (!date) return ""; const d = new Date(date); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0, 16); }

        function initAdminCalendar() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', locale: 'fr', firstDay: 1, 
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
                events: async function(info, successCallback, failureCallback) {
                    const { data, error } = await supabaseClient.from('events').select('*').eq('section_id', currentSectionId);
                    if (error) failureCallback(error); else successCallback(data.map(e => ({ id: e.id, title: e.title, start: new Date(e.start_time), end: new Date(e.end_time), extendedProps: { description: e.description, location: e.location }, backgroundColor: '#2E7D32', borderColor: '#1B5E20' })));
                },
                dateClick: function(info) {
                    currentEventId = null; document.getElementById('eventForm').reset();
                    document.getElementById('modalTitle').textContent = "Ajouter un événement"; document.getElementById('deleteEventBtn').classList.add('hidden');
                    document.getElementById('eventStart').value = `${info.dateStr}T14:00`; document.getElementById('eventEnd').value = `${info.dateStr}T17:00`;
                    eventModal.classList.remove('hidden');
                },
                eventClick: function(info) {
                    currentEventId = info.event.id; document.getElementById('modalTitle').textContent = "Modifier l'événement";
                    document.getElementById('eventTitle').value = info.event.title; document.getElementById('eventDesc').value = info.event.extendedProps.description || "";
                    document.getElementById('eventLocation').value = info.event.extendedProps.location || "";
                    document.getElementById('eventStart').value = toDatetimeLocal(info.event.start); document.getElementById('eventEnd').value = toDatetimeLocal(info.event.end || info.event.start);
                    document.getElementById('deleteEventBtn').classList.remove('hidden'); eventModal.classList.remove('hidden');
                }
            });
            calendar.render();
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => { eventModal.classList.add('hidden'); });

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('saveEventBtn'); btn.disabled = true; btn.textContent = "Sauvegarde...";
            const eventData = {
                section_id: currentSectionId,
                title: document.getElementById('eventTitle').value, description: document.getElementById('eventDesc').value,
                location: document.getElementById('eventLocation').value,
                start_time: new Date(document.getElementById('eventStart').value).toISOString(), end_time: new Date(document.getElementById('eventEnd').value).toISOString()
            };
            let res = currentEventId ? await supabaseClient.from('events').update(eventData).eq('id', currentEventId) : await supabaseClient.from('events').insert([eventData]);
            if (res.error) alert(res.error.message); else { eventModal.classList.add('hidden'); calendar.refetchEvents(); }
            btn.disabled = false; btn.textContent = "Enregistrer";
        });

        document.getElementById('deleteEventBtn').addEventListener('click', async () => {
            if (!currentEventId || !confirm("Supprimer définitivement ?")) return;
            await supabaseClient.from('events').delete().eq('id', currentEventId);
            eventModal.classList.add('hidden'); calendar.refetchEvents();
        });

        async function showDashboard() {
            ui.auth.classList.add('hidden'); ui.dash.classList.remove('hidden'); ui.userMenu.classList.remove('hidden');
            ui.userEmailDisplay.textContent = await getActiveEmail();
            fetchAbsences(); loadDmChildren();
            setTimeout(() => { initAdminCalendar(); }, 100);
        }

        supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
            if (session) {
                const { data: admin } = await supabaseClient.from('admins').select('section_id').eq('email', session.user.email).maybeSingle();
                if(admin) { currentSectionId = admin.section_id; showDashboard(); } else { supabaseClient.auth.signOut(); }
            } else { ui.auth.classList.remove('hidden'); }
        });
    </script>
</body>
</html>
