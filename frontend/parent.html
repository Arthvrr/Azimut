<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azimut - Espace Parent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 
            parent: { primary: '#800020', light: '#F8E7EB', dark: '#4d0013' } 
        } } } }
    </script>
    <style>
        .fc .fc-toolbar-title { font-size: 1.1rem; font-weight: 700; color: #111827; text-transform: capitalize; }
        .fc .fc-button-primary { background-color: #800020 !important; border-color: #800020 !important; }
        .fc .fc-button-primary:hover { background-color: #4d0013 !important; }
        .fc-event { cursor: pointer; } 
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-parent-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">A</div>
            <h1 class="text-2xl font-bold text-gray-900">Azimut <span class="text-sm font-normal text-gray-500 ml-2">Espace Parent</span></h1>
        </div>
        <div id="userMenu" class="hidden flex items-center gap-4">
            <span class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-medium border border-gray-200">
                Connecté : <span id="userEmailDisplay" class="font-bold text-parent-primary"></span>
            </span>
            <button id="logoutBtnNav" class="text-sm text-gray-600 hover:text-red-600 font-medium">Se déconnecter</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-6">
        
        <div id="authSection" class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex mb-6 border-b border-gray-200">
                <button id="tabLogin" class="flex-1 pb-3 text-center font-bold text-parent-primary border-b-2 border-parent-primary transition-colors">Connexion</button>
                <button id="tabRegister" class="flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent transition-colors hover:text-gray-700">Rejoindre une section</button>
            </div>
            
            <div id="authMessage" class="mb-4 text-sm text-center font-medium"></div>
            
            <form id="loginForm" class="space-y-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label><input type="email" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary"></div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary pr-10">
                        <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-parent-primary text-white px-4 py-3 rounded-lg font-bold hover:bg-parent-dark transition-colors">Se connecter</button>
                <div class="text-center mt-2"><button type="button" id="forgotPasswordBtn" class="text-xs text-gray-500 hover:text-parent-primary hover:underline">Mot de passe oublié ?</button></div>
            </form>

            <form id="registerForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unité</label>
                    <select id="regUnite" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary bg-white"><option value="">Chargement...</option></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
                    <select id="regSection" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary bg-white"><option value="">-- Choisir une unité d'abord --</option></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Code secret parent</label>
                    <div class="relative">
                        <input type="password" id="regCode" required placeholder="Ex: PARENTS-CODE" class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary pr-10">
                        <button type="button" onclick="togglePassword('regCode', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <hr class="my-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label><input type="email" id="regEmail" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary"></div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe (min. 6 car.)</label>
                    <div class="relative">
                        <input type="password" id="regPassword" required class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary pr-10">
                        <button type="button" onclick="togglePassword('regPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="registerBtn" class="w-full bg-parent-primary text-white px-4 py-3 rounded-lg font-bold hover:bg-parent-dark transition-colors">Créer mon compte</button>
            </form>
        </div>

        <div id="dashboardSection" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 flex flex-col">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                        <div><h2 class="text-xl font-bold text-gray-900">Mes Enfants</h2><p class="text-sm text-gray-500">Gérez les fiches médicales.</p></div>
                        <button id="openChildModalBtn" class="bg-parent-light text-parent-primary hover:bg-parent-primary hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">+ Ajouter</button>
                    </div>
                    <div id="childrenList" class="space-y-3 flex-1 overflow-y-auto max-h-[300px]"><p class="text-sm text-gray-500 text-center italic mt-4">Chargement...</p></div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                    <h2 class="text-xl font-bold text-gray-900 mb-2">Signaler une absence</h2>
                    <p class="text-sm text-gray-500 mb-6 border-b border-gray-100 pb-4">Prévenez les chefs en un clic.</p>
                    <form id="absenceForm" class="space-y-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Enfant absent</label><select id="absChild" required class="w-full px-4 py-2 rounded-lg border bg-white outline-none focus:ring-2 focus:ring-parent-primary"><option value="">Chargement...</option></select></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Pour quel événement ?</label><select id="absEvent" required class="w-full px-4 py-2 rounded-lg border bg-white outline-none focus:ring-2 focus:ring-parent-primary"><option value="">Chargement...</option></select></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Raison (Optionnel)</label><input type="text" id="absReason" placeholder="Malade, repas de famille..." class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary"></div>
                        <button type="submit" id="submitAbsenceBtn" class="w-full bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">Envoyer le signalement</button>
                        <p id="absenceMsg" class="text-sm text-center mt-2"></p>
                    </form>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                    <div><h3 class="text-lg font-bold text-gray-900">Newsletter</h3><p class="text-sm text-gray-500">Convocations et actus.</p><p id="subMessage" class="mt-1 text-xs font-medium"></p></div>
                    <button id="toggleSubBtn" class="px-6 py-2 rounded-lg font-medium transition-colors text-sm">Chargement...</button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">Sécurité</h3>
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="password" id="newPassword" placeholder="Nouveau mot de passe" class="w-full px-4 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-parent-primary text-sm pr-10">
                            <button type="button" onclick="togglePassword('newPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                            </button>
                        </div>
                        <button type="button" id="updatePasswordBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg text-sm font-medium transition-colors">Modifier</button>
                        <p id="updatePasswordMsg" class="mt-2 text-xs font-medium text-center"></p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                    <h2 class="text-xl font-bold text-gray-900">Éphéméride de la section</h2>
                    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Lecture seule</span>
                </div>
                <div id="parentCalendar" class="min-h-[500px]"></div>
            </div>

            <div class="text-center pt-4 pb-10"><button id="logoutBtnMain" class="text-red-500 hover:text-red-700 font-medium transition-colors">Se déconnecter de l'Espace Parent</button></div>
        </div>
    </main>

    <div id="childModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-gray-900 mb-4 border-b pb-2">Fiche Enfant</h3>
            <form id="childForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Prénom</label><input type="text" id="cFirstName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-parent-primary outline-none"></div>
                    <div><label class="block text-sm font-medium">Nom</label><input type="text" id="cLastName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-parent-primary outline-none"></div>
                </div>
                <div class="bg-parent-light p-4 rounded-lg">
                    <label class="block text-sm font-bold text-parent-primary">Fiche médicale (PDF)</label>
                    <input type="file" id="cMedicalFile" accept=".pdf" class="w-full text-sm mt-1">
                </div>
                <div><label class="block text-sm font-medium">Allergies</label><textarea id="cAllergies" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-parent-primary outline-none"></textarea></div>
                <div><label class="block text-sm font-medium">Soins particuliers</label><textarea id="cCare" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-parent-primary outline-none"></textarea></div>
                <div class="grid grid-cols-2 gap-4 border-t pt-4">
                    <div><p class="font-bold text-sm mb-2">Parent 1</p><input type="text" id="cP1Name" placeholder="Nom" required class="w-full px-3 py-2 border rounded-lg mb-2 text-sm focus:ring-2 focus:ring-parent-primary outline-none"><input type="tel" id="cP1Phone" placeholder="Tél" required class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-parent-primary outline-none"></div>
                    <div><p class="font-bold text-sm mb-2">Parent 2 (Optionnel)</p><input type="text" id="cP2Name" placeholder="Nom" class="w-full px-3 py-2 border rounded-lg mb-2 text-sm focus:ring-2 focus:ring-parent-primary outline-none"><input type="tel" id="cP2Phone" placeholder="Tél" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-parent-primary outline-none"></div>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" id="closeChildModalBtn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-medium transition-colors">Annuler</button>
                    <button type="submit" id="saveChildBtn" class="flex-1 bg-parent-primary hover:bg-parent-dark text-white px-4 py-2 rounded-lg font-medium transition-colors">Enregistrer</button>
                </div>
                <p id="childErrorMsg" class="text-sm text-red-500 text-center hidden"></p>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://nbhpninmmpayivjqhouj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iaHBuaW5tbXBheWl2anFob3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTgyNzMsImV4cCI6MjA5ODEzNDI3M30.A6BdwmCVq6uWK6hlNekvetek3Er3LfO67vfwlRPpcpU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        let isSubscribed = false;
        let parentCalendarInstance = null; 
        let currentSectionId = null;

        const ui = {
            auth: document.getElementById('authSection'), dash: document.getElementById('dashboardSection'), msg: document.getElementById('authMessage'),
            loginForm: document.getElementById('loginForm'), registerForm: document.getElementById('registerForm'),
            tabLogin: document.getElementById('tabLogin'), tabRegister: document.getElementById('tabRegister'),
            userMenu: document.getElementById('userMenu'), userEmailDisplay: document.getElementById('userEmailDisplay')
        };

        // --- FONCTION MAGIQUE : AFFICHER/MASQUER LE MOT DE PASSE ---
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg class="w-5 h-5 text-parent-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>`;
            }
        }

        // --- GESTION DES ONGLETS AUTHENTIFICATION ---
        ui.tabLogin.addEventListener('click', () => {
            ui.loginForm.classList.remove('hidden'); ui.registerForm.classList.add('hidden');
            ui.tabLogin.className = "flex-1 pb-3 text-center font-bold text-parent-primary border-b-2 border-parent-primary transition-colors";
            ui.tabRegister.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent transition-colors hover:text-gray-700";
            ui.msg.textContent = "";
        });
        ui.tabRegister.addEventListener('click', () => {
            ui.registerForm.classList.remove('hidden'); ui.loginForm.classList.add('hidden');
            ui.tabRegister.className = "flex-1 pb-3 text-center font-bold text-parent-primary border-b-2 border-parent-primary transition-colors";
            ui.tabLogin.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent transition-colors hover:text-gray-700";
            ui.msg.textContent = ""; loadUnites();
        });

        // --- CHARGEMENT DYNAMIQUE UNITÉS & SECTIONS ---
        async function loadUnites() {
            const { data } = await supabaseClient.from('unites').select('id, nom_complet');
            const select = document.getElementById('regUnite');
            if(data) select.innerHTML = '<option value="">-- Choisir une unité --</option>' + data.map(u => `<option value="${u.id}">${u.nom_complet}</option>`).join('');
        }
        document.getElementById('regUnite').addEventListener('change', async (e) => {
            const uniteId = e.target.value;
            const select = document.getElementById('regSection');
            if(!uniteId) { select.innerHTML = '<option value="">-- Choisir une unité d\'abord --</option>'; return; }
            const { data } = await supabaseClient.from('sections').select('id, nom').eq('unite_id', uniteId);
            if(data) select.innerHTML = '<option value="">-- Choisir une section --</option>' + data.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');
        });

        async function getActiveEmail() { const { data: { session } } = await supabaseClient.auth.getSession(); return session?.user?.email; }

        // --- CONNEXION ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
            ui.msg.textContent = "Connexion..."; ui.msg.className = "mb-4 text-sm text-center text-gray-600";
            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                const { data: sub } = await supabaseClient.from('newsletter_subscribers').select('section_id').eq('email', email).maybeSingle();
                if(sub) currentSectionId = sub.section_id;
                else throw new Error("Votre compte n'est lié à aucune section. Veuillez vous réinscrire.");
                await showDashboard();
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        // --- INSCRIPTION & VERIFICATION DU CODE ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sectionId = document.getElementById('regSection').value;
            const codeInput = document.getElementById('regCode').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if(!sectionId) return alert("Veuillez choisir une section.");
            ui.msg.textContent = "Vérification..."; ui.msg.className = "mb-4 text-sm text-center text-gray-600";
            
            try {
                const { data: sec } = await supabaseClient.from('sections').select('code_parent').eq('id', sectionId).single();
                if(!sec || sec.code_parent !== codeInput) throw new Error("Code secret parent invalide.");

                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;

                await supabaseClient.from('newsletter_subscribers').insert([{ section_id: sectionId, email: email, is_subscribed: true }]);
                
                currentSectionId = sectionId;
                await showDashboard();
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        // Gestion de la Déconnexion
        const logoutAction = async () => { await supabaseClient.auth.signOut(); window.location.reload(); };
        document.getElementById('logoutBtnNav').addEventListener('click', logoutAction);
        document.getElementById('logoutBtnMain').addEventListener('click', logoutAction);

        // --- MOT DE PASSE OUBLIÉ ET SÉCURITÉ ---
        document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) { ui.msg.textContent = "Veuillez entrer votre e-mail dans le champ ci-dessus."; ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600"; return; }
            ui.msg.textContent = "Envoi du lien..."; ui.msg.className = "mb-4 text-sm text-center font-medium text-gray-600";
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) { ui.msg.textContent = error.message; ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600"; }
            else { ui.msg.textContent = "E-mail envoyé (vérifiez vos spams)."; ui.msg.className = "mb-4 text-sm text-center font-medium text-parent-primary"; }
        });

        document.getElementById('updatePasswordBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const msg = document.getElementById('updatePasswordMsg');
            if (!newPassword || newPassword.length < 6) { msg.textContent = "Min. 6 caractères."; msg.className = "mt-2 text-sm font-medium text-red-600"; return; }
            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
            if (error) { msg.textContent = error.message; msg.className = "mt-2 text-sm font-medium text-red-600"; } 
            else { msg.textContent = "Mot de passe mis à jour !"; msg.className = "mt-2 text-sm font-medium text-parent-primary"; document.getElementById('newPassword').value = ""; }
        });

        // --- TABLEAU DE BORD DYNAMIQUE ---
        async function loadChildren() {
            const email = await getActiveEmail();
            const { data } = await supabaseClient.from('children').select('*').eq('parent_email', email).eq('section_id', currentSectionId);
            const list = document.getElementById('childrenList'), absSelect = document.getElementById('absChild');
            
            if (!data || data.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-500 italic mt-2">Aucun enfant ajouté.</p>`;
                absSelect.innerHTML = `<option value="">Ajoutez d'abord un enfant</option>`;
                return;
            }
            list.innerHTML = data.map(c => `<div class="p-3 border rounded-lg bg-gray-50 flex justify-between items-center"><div><p class="font-bold">${c.first_name} ${c.last_name}</p>${c.allergies ? `<p class="text-xs text-red-500">⚠️ ${c.allergies}</p>` : ''}</div>${c.medical_file_url ? `<a href="${c.medical_file_url}" target="_blank" class="text-xs bg-white border px-2 py-1 rounded text-parent-primary font-bold">📄 Voir PDF</a>` : ''}</div>`).join('');
            absSelect.innerHTML = `<option value="">-- Choisir --</option>` + data.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
        }

        // Modale Enfant
        document.getElementById('openChildModalBtn').addEventListener('click', () => { document.getElementById('childForm').reset(); document.getElementById('childModal').classList.remove('hidden'); });
        document.getElementById('closeChildModalBtn').addEventListener('click', () => document.getElementById('childModal').classList.add('hidden'));

        document.getElementById('childForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('saveChildBtn'); btn.disabled = true; btn.textContent = "Sauvegarde...";
            try {
                const email = await getActiveEmail(); let pdfUrl = null; const fileInput = document.getElementById('cMedicalFile');
                if (fileInput.files.length > 0) {
                    const fileName = `${email}_${Date.now()}_${fileInput.files[0].name}`;
                    const { error: uploadErr } = await supabaseClient.storage.from('medical_files').upload(fileName, fileInput.files[0]);
                    if (uploadErr) throw uploadErr;
                    pdfUrl = supabaseClient.storage.from('medical_files').getPublicUrl(fileName).data.publicUrl;
                }
                const childData = {
                    parent_email: email, section_id: currentSectionId,
                    first_name: document.getElementById('cFirstName').value, last_name: document.getElementById('cLastName').value,
                    allergies: document.getElementById('cAllergies').value, care_instructions: document.getElementById('cCare').value,
                    parent1_name: document.getElementById('cP1Name').value, parent1_phone: document.getElementById('cP1Phone').value,
                    parent2_name: document.getElementById('cP2Name').value, parent2_phone: document.getElementById('cP2Phone').value,
                    medical_file_url: pdfUrl
                };
                const { error } = await supabaseClient.from('children').insert([childData]);
                if (error) throw error;
                document.getElementById('childModal').classList.add('hidden'); await loadChildren();
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.textContent = "Enregistrer"; }
        });

        // Absences
        async function loadUpcomingEvents() {
            const select = document.getElementById('absEvent');
            const { data } = await supabaseClient.from('events').select('id, title, start_time').eq('section_id', currentSectionId).gte('start_time', new Date().toISOString()).order('start_time', {ascending: true});
            if (!data || data.length === 0) { select.innerHTML = `<option value="">Aucun événement futur</option>`; return; }
            select.innerHTML = `<option value="">-- Choisir --</option>` + data.map(e => `<option value="${e.id}">${e.title} (${new Date(e.start_time).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'})})</option>`).join('');
        }
        document.getElementById('absenceForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const msg = document.getElementById('absenceMsg'); msg.textContent = "Envoi...";
            try {
                const childId = document.getElementById('absChild').value, eventId = document.getElementById('absEvent').value, reason = document.getElementById('absReason').value;
                if (!childId || !eventId) throw new Error("Sélection manquante.");
                const { error } = await supabaseClient.from('absences').insert([{ child_id: childId, event_id: eventId, reason: reason }]);
                if (error) throw error;
                msg.textContent = "Absence signalée !"; msg.className = "text-sm text-center mt-2 text-parent-primary font-bold"; document.getElementById('absReason').value = "";
            } catch (err) { msg.textContent = err.message; msg.className = "text-sm text-center mt-2 text-red-500 font-bold"; }
        });

        // Calendrier
        function initParentCalendar() {
            if (parentCalendarInstance) parentCalendarInstance.destroy();
            parentCalendarInstance = new FullCalendar.Calendar(document.getElementById('parentCalendar'), {
                initialView: 'dayGridMonth', locale: 'fr', firstDay: 1,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
                events: async function(info, successCallback, failureCallback) {
                    const { data, error } = await supabaseClient.from('events').select('*').eq('section_id', currentSectionId);
                    if (error) failureCallback(error);
                    else successCallback(data.map(e => ({ id: e.id, title: e.title, start: new Date(e.start_time), end: new Date(e.end_time), extendedProps: { description: e.description, location: e.location }, backgroundColor: '#800020', borderColor: '#4d0013' })));
                },
                eventClick: function(info) { alert(`Événement : ${info.event.title}\nLieu : ${info.event.extendedProps.location || "Non précisé"}\nDétails : ${info.event.extendedProps.description || "Aucun"}`); }
            });
            parentCalendarInstance.render();
        }

        // Newsletter
        async function checkSubscriptionStatus() {
            const activeEmail = await getActiveEmail();
            const { data } = await supabaseClient.from('newsletter_subscribers').select('is_subscribed').eq('email', activeEmail).eq('section_id', currentSectionId).maybeSingle();
            isSubscribed = data ? data.is_subscribed : false;
            updateSubButton();
        }
        document.getElementById('toggleSubBtn').addEventListener('click', async () => {
            const activeEmail = await getActiveEmail(); const newStatus = !isSubscribed;
            await supabaseClient.from('newsletter_subscribers').update({ is_subscribed: newStatus }).eq('email', activeEmail).eq('section_id', currentSectionId);
            isSubscribed = newStatus; updateSubButton();
        });
        function updateSubButton() { document.getElementById('toggleSubBtn').textContent = isSubscribed ? "Se désabonner" : "S'abonner"; document.getElementById('toggleSubBtn').className = isSubscribed ? "px-6 py-2 rounded-lg text-sm border-2 border-red-500 text-red-500" : "px-6 py-2 rounded-lg text-sm bg-parent-primary text-white"; }

        // --- INITIALISATION GLOBALE ---
        async function showDashboard() {
            ui.auth.classList.add('hidden'); ui.dash.classList.remove('hidden'); ui.userMenu.classList.remove('hidden');
            ui.userEmailDisplay.textContent = await getActiveEmail();
            await loadChildren(); await loadUpcomingEvents(); await checkSubscriptionStatus();
            setTimeout(() => { initParentCalendar(); }, 100);
        }

        supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
            if (session) {
                const { data: sub } = await supabaseClient.from('newsletter_subscribers').select('section_id').eq('email', session.user.email).maybeSingle();
                if(sub) { currentSectionId = sub.section_id; showDashboard(); } else { supabaseClient.auth.signOut(); }
            } else { ui.auth.classList.remove('hidden'); }
        });
    </script>
</body>
</html>
