<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azimut - Chef d'Unité</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { unite: { primary: '#1E3A8A', light: '#EFF6FF', dark: '#1E40AF' }, scout: { green: '#2E7D32' } } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-unite-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">A</div>
            <h1 class="text-2xl font-bold text-gray-900">Azimut <span class="text-sm font-normal text-gray-500 ml-2">Espace Chef d'Unité</span></h1>
        </div>
        <div id="userMenu" class="hidden flex items-center gap-4">
            <span class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-medium border border-gray-200">Connecté : <span id="userEmailDisplay" class="font-bold text-unite-primary"></span></span>
            <button id="logoutBtnNav" class="text-sm text-gray-600 hover:text-red-600 font-medium">Se déconnecter</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-10 p-6 space-y-8">
        
        <div id="authSection" class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex mb-6 border-b border-gray-200">
                <button id="tabLogin" class="flex-1 pb-3 text-center font-bold text-unite-primary border-b-2 border-unite-primary">Connexion</button>
                <button id="tabRegister" class="flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent">Nouveau Chef d'Unité</button>
            </div>
            <div id="authMessage" class="mb-4 text-sm text-center font-medium"></div>
            
            <form id="loginForm" class="space-y-4">
                <div><label class="block text-sm font-medium">E-mail</label><input type="email" id="loginEmail" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-unite-primary"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mot de passe</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-unite-primary pr-10">
                        <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-unite-primary text-white px-4 py-3 rounded-lg font-bold hover:bg-unite-dark">Se connecter</button>
                <div class="text-center mt-2"><button type="button" id="forgotPasswordBtn" class="text-xs text-gray-500 hover:text-unite-primary hover:underline">Mot de passe oublié ?</button></div>
            </form>

            <form id="registerForm" class="space-y-4 hidden">
                <div><label class="block text-sm font-medium mb-1">Votre Unité</label><select id="regUnite" required class="w-full px-3 py-2 border rounded outline-none"><option value="">Chargement...</option></select></div>
                <div><label class="block text-sm font-medium text-red-600 mb-1">Code Secret d'Unité</label><input type="password" id="regCode" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                <hr>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm font-medium">Prénom</label><input type="text" id="regFName" required class="w-full px-3 py-2 border rounded outline-none"></div>
                    <div><label class="block text-sm font-medium">Nom</label><input type="text" id="regLName" required class="w-full px-3 py-2 border rounded outline-none"></div>
                </div>
                <div><label class="block text-sm font-medium">Totem</label><input type="text" id="regTotem" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                <div><label class="block text-sm font-medium">E-mail</label><input type="email" id="regEmail" required class="w-full px-4 py-2 border rounded-lg outline-none"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mot de passe</label>
                    <div class="relative">
                        <input type="password" id="regPassword" required class="w-full px-4 py-2 border rounded-lg outline-none pr-10">
                        <button type="button" onclick="togglePassword('regPassword', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-unite-primary text-white px-4 py-3 rounded-lg font-bold hover:bg-unite-dark">Valider mon profil Chef d'Unité</button>
            </form>
        </div>

        <div id="dashboardSection" class="hidden space-y-6">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full border-t-4 border-t-unite-primary">
                <h2 class="text-xl font-bold text-gray-900 mb-2">Communiqué à l'Unité Entière</h2>
                <p class="text-sm text-gray-500 mb-6 border-b border-gray-100 pb-4">Cet outil envoie un e-mail à TOUS les parents et TOUS les chefs de TOUTES les sections confondues.</p>
                <form id="unitMailForm" class="space-y-4">
                    <div><label class="block text-sm font-medium">Sujet</label><input type="text" id="subject" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-unite-primary"></div>
                    <div><label class="block text-sm font-medium">Message</label><textarea id="message" rows="6" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-unite-primary"></textarea></div>
                    <button type="submit" id="submitBtn" class="w-full md:w-auto md:px-12 bg-unite-primary hover:bg-unite-dark text-white py-3 rounded-lg font-medium">Envoyer le message général</button>
                    <p id="statusMessage" class="mt-2 text-sm font-medium"></p>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full">
                <h2 class="text-xl font-bold text-gray-900 mb-2">Annuaire Global de l'Unité</h2>
                
                <div class="flex flex-col md:flex-row gap-4 mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <input type="text" id="searchDir" placeholder="Rechercher un e-mail ou un nom..." class="flex-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-unite-primary">
                    <select id="filterSection" class="px-4 py-2 border rounded-lg outline-none"><option value="all">Toutes les sections</option></select>
                    <select id="filterType" class="px-4 py-2 border rounded-lg outline-none">
                        <option value="all">Tous rôles</option>
                        <option value="chef">Staffs</option>
                        <option value="parent">Parents</option>
                    </select>
                </div>
                
                <div id="directoryList" class="overflow-y-auto max-h-[500px] pr-2 space-y-2">
                    <p class="text-gray-500 text-sm text-center mt-10">Chargement de l'annuaire...</p>
                </div>
            </div>

            <div class="text-center pt-4 pb-10">
                <button id="logoutBtnMain" class="text-red-500 hover:text-red-700 font-medium flex items-center gap-2 justify-center w-full transition-colors">Se déconnecter de l'Unité</button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://nbhpninmmpayivjqhouj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iaHBuaW5tbXBheWl2anFob3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTgyNzMsImV4cCI6MjA5ODEzNDI3M30.A6BdwmCVq6uWK6hlNekvetek3Er3LfO67vfwlRPpcpU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUniteId = null;
        let allDirectoryData = [];

        const ui = {
            auth: document.getElementById('authSection'), dash: document.getElementById('dashboardSection'), msg: document.getElementById('authMessage'),
            loginForm: document.getElementById('loginForm'), registerForm: document.getElementById('registerForm'),
            tabLogin: document.getElementById('tabLogin'), tabRegister: document.getElementById('tabRegister')
        };

        // Fonction pour afficher/masquer le mot de passe
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg class="w-5 h-5 text-unite-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>`;
            }
        }

        async function getActiveEmail() { const { data: { session } } = await supabaseClient.auth.getSession(); return session?.user?.email; }

        ui.tabLogin.addEventListener('click', () => { ui.loginForm.classList.remove('hidden'); ui.registerForm.classList.add('hidden'); ui.tabLogin.className = "flex-1 pb-3 text-center font-bold text-unite-primary border-b-2 border-unite-primary"; ui.tabRegister.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700"; ui.msg.textContent = ""; });
        ui.tabRegister.addEventListener('click', () => { ui.registerForm.classList.remove('hidden'); ui.loginForm.classList.add('hidden'); ui.tabRegister.className = "flex-1 pb-3 text-center font-bold text-unite-primary border-b-2 border-unite-primary"; ui.tabLogin.className = "flex-1 pb-3 text-center font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700"; ui.msg.textContent = ""; loadUnites(); });

        async function loadUnites() {
            const { data } = await supabaseClient.from('unites').select('id, nom_complet');
            if(data) document.getElementById('regUnite').innerHTML = '<option value="">-- Choisir l\'unité --</option>' + data.map(u => `<option value="${u.id}">${u.nom_complet}</option>`).join('');
        }

        // --- MOT DE PASSE OUBLIÉ ---
        document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                ui.msg.textContent = "Veuillez entrer votre e-mail dans le champ ci-dessus.";
                ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600";
                return;
            }
            ui.msg.textContent = "Envoi du lien..."; ui.msg.className = "mb-4 text-sm text-center font-medium text-gray-600";
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) { ui.msg.textContent = error.message; ui.msg.className = "mb-4 text-sm text-center font-medium text-red-600"; }
            else { ui.msg.textContent = "E-mail envoyé (vérifiez vos spams)."; ui.msg.className = "mb-4 text-sm text-center font-medium text-unite-primary"; }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
            ui.msg.textContent = "Vérification..."; ui.msg.className = "mb-4 text-sm text-center text-gray-600";
            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                const { data: admin } = await supabaseClient.from('admins').select('unite_id, role').eq('email', email).maybeSingle();
                if(admin && admin.role === 'super_admin') { currentUniteId = admin.unite_id; showDashboard(); }
                else { await supabaseClient.auth.signOut(); throw new Error("Accès refusé. Vous n'êtes pas Animateur d'Unité."); }
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uniteId = document.getElementById('regUnite').value, codeInput = document.getElementById('regCode').value;
            const email = document.getElementById('regEmail').value, password = document.getElementById('regPassword').value;
            const fname = document.getElementById('regFName').value, lname = document.getElementById('regLName').value, totem = document.getElementById('regTotem').value;
            
            try {
                const { data: u } = await supabaseClient.from('unites').select('code_superadmin').eq('id', uniteId).single();
                if(!u || u.code_superadmin !== codeInput) throw new Error("Code secret d'Unité invalide !");

                const { error: authErr } = await supabaseClient.auth.signUp({ email, password });
                if (authErr) throw authErr;
                await supabaseClient.from('admins').insert([{ email: email, first_name: fname, last_name: lname, totem: totem, unite_id: uniteId, role: 'super_admin' }]);
                
                currentUniteId = uniteId; showDashboard();
            } catch (err) { ui.msg.textContent = err.message; ui.msg.className = "mb-4 text-sm text-center text-red-600"; }
        });

        const logoutAction = async () => { await supabaseClient.auth.signOut(); window.location.reload(); };
        document.getElementById('logoutBtnNav').addEventListener('click', logoutAction);
        document.getElementById('logoutBtnMain').addEventListener('click', logoutAction);

        // --- DASHBOARD : ANNUAIRE AVEC FILTRES ---
        async function fetchDirectory() {
            allDirectoryData = [];
            const { data: sections } = await supabaseClient.from('sections').select('id, nom').eq('unite_id', currentUniteId);
            if (!sections) return;

            document.getElementById('filterSection').innerHTML = '<option value="all">Toutes sections</option>' + sections.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');

            for (const sec of sections) {
                const { data: staff } = await supabaseClient.from('admins').select('first_name, last_name, totem, email').eq('section_id', sec.id);
                if (staff) staff.forEach(s => allDirectoryData.push({ email: s.email, name: `${s.first_name} "${s.totem}" ${s.last_name}`, role: 'chef', secNom: sec.nom, secId: sec.id }));

                const { data: parents } = await supabaseClient.from('newsletter_subscribers').select('email').eq('section_id', sec.id);
                if (parents) parents.forEach(p => allDirectoryData.push({ email: p.email, name: 'Parent', role: 'parent', secNom: sec.nom, secId: sec.id }));
            }
            renderDirectory();
        }

        function renderDirectory() {
            const term = document.getElementById('searchDir').value.toLowerCase();
            const secFilter = document.getElementById('filterSection').value;
            const typeFilter = document.getElementById('filterType').value;

            const filtered = allDirectoryData.filter(item => {
                const matchSearch = item.email.toLowerCase().includes(term) || item.name.toLowerCase().includes(term);
                const matchSec = secFilter === 'all' || item.secId.toString() === secFilter;
                const matchType = typeFilter === 'all' || item.role === typeFilter;
                return matchSearch && matchSec && matchType;
            });

            const list = document.getElementById('directoryList');
            if(filtered.length === 0) { list.innerHTML = '<p class="text-sm text-gray-500 text-center mt-4">Aucun résultat.</p>'; return; }

            list.innerHTML = filtered.map(item => `
                <div class="p-4 bg-white border border-gray-100 rounded-lg flex flex-col md:flex-row md:items-center justify-between shadow-sm hover:shadow transition-shadow">
                    <div class="mb-2 md:mb-0">
                        <p class="font-bold text-gray-800 text-sm">${item.name}</p>
                        <p class="text-xs text-gray-500">${item.email}</p>
                    </div>
                    <div class="flex gap-2">
                        <span class="text-xs px-3 py-1 rounded-full ${item.role === 'chef' ? 'bg-green-100 text-green-700 font-bold' : 'bg-gray-100 text-gray-600'}">${item.role === 'chef' ? 'Staff' : 'Parent'}</span>
                        <span class="text-xs px-3 py-1 rounded-full bg-unite-light text-unite-primary font-bold">${item.secNom}</span>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchDir').addEventListener('input', renderDirectory);
        document.getElementById('filterSection').addEventListener('change', renderDirectory);
        document.getElementById('filterType').addEventListener('change', renderDirectory);

        // --- ENVOI MAIL UNITÉ ---
        document.getElementById('unitMailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'), statusText = document.getElementById('statusMessage');
            btn.disabled = true; btn.textContent = 'Envoi en cours...'; statusText.textContent = '';
            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/send-unit-newsletter', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: document.getElementById('subject').value, message: document.getElementById('message').value, unite_id: currentUniteId })
                });
                const data = await response.json();
                if (response.ok) { statusText.textContent = data.message; statusText.className = "mt-2 text-sm text-unite-primary font-bold"; document.getElementById('unitMailForm').reset(); }
                else throw new Error(data.detail);
            } catch (err) { statusText.textContent = err.message; statusText.className = "mt-2 text-sm text-red-600 font-bold"; }
            finally { btn.disabled = false; btn.textContent = 'Envoyer le message général'; }
        });

        async function showDashboard() {
            ui.auth.classList.add('hidden'); ui.dash.classList.remove('hidden'); document.getElementById('userMenu').classList.remove('hidden');
            document.getElementById('userEmailDisplay').textContent = await getActiveEmail();
            fetchDirectory();
        }

        supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
            if (session) {
                const { data: admin } = await supabaseClient.from('admins').select('unite_id, role').eq('email', session.user.email).maybeSingle();
                if(admin && admin.role === 'super_admin') { currentUniteId = admin.unite_id; showDashboard(); } else { supabaseClient.auth.signOut(); }
            } else { ui.auth.classList.remove('hidden'); }
        });
    </script>
</body>
</html>
